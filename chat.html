<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyMentor AI - Chat</title>
<meta name="description" content="MoneyMentor AI: a full chat workspace with separate conversations, suggested prompts, and answers grounded in trusted Singapore sources.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/styles.css">
<style>
/* ---------- AI workspace layout ---------- */
body[data-page="chat"]{overflow:hidden}
.ai-shell{display:flex;height:100dvh;background:var(--paper)}

/* sidebar */
.ai-side{width:280px;flex-shrink:0;display:flex;flex-direction:column;background:#0F231B;color:#DCEDE2;border-right:1px solid rgba(255,255,255,.06)}
.ai-side-head{display:flex;align-items:center;gap:10px;padding:16px 16px 10px}
.ai-side-head .brand{color:#fff;font-family:var(--display);font-weight:800;font-size:1.05rem;display:flex;align-items:center;gap:8px;text-decoration:none}
.ai-newchat{margin:6px 14px 12px;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 14px;border-radius:12px;border:1px solid rgba(123,230,168,.35);background:rgba(123,230,168,.1);color:#7BE6A8;font-weight:700;font-size:.9rem;cursor:pointer;font-family:var(--body);transition:background var(--t-fast)}
.ai-newchat:hover{background:rgba(123,230,168,.2)}
.ai-side-label{padding:6px 18px;font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(220,237,226,.5)}
.ai-chatlist{flex:1;overflow-y:auto;padding:0 10px 10px;display:flex;flex-direction:column;gap:2px}
.ai-chatitem{display:flex;align-items:center;gap:8px;padding:10px 10px;border-radius:10px;cursor:pointer;color:#C6DCCE;font-size:.86rem;border:none;background:transparent;text-align:left;width:100%;font-family:var(--body)}
.ai-chatitem:hover{background:rgba(255,255,255,.06)}
.ai-chatitem.active{background:rgba(123,230,168,.14);color:#fff}
.ai-chatitem .t{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-chatitem .del{opacity:0;border:none;background:transparent;color:#9FB8A8;cursor:pointer;padding:3px;border-radius:6px;line-height:0}
.ai-chatitem:hover .del{opacity:1}
.ai-chatitem .del:hover{color:#FF9C85;background:rgba(255,255,255,.08)}
.ai-side-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);display:grid;gap:8px}
.ai-side-foot a{color:#C6DCCE;font-size:.82rem;text-decoration:none;display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px}
.ai-side-foot a:hover{background:rgba(255,255,255,.06);color:#fff}
.ai-profile-chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;background:rgba(255,255,255,.05);font-size:.78rem;line-height:1.35}
.ai-profile-chip .av{width:30px;height:30px;border-radius:50%;background:var(--mint);color:#0A4F3B;display:grid;place-items:center;font-weight:800;flex-shrink:0}
.ai-profile-chip b{color:#fff;display:block}

/* main column */
.ai-main{flex:1;display:flex;flex-direction:column;min-width:0}
.ai-topbar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--card)}
.ai-topbar h1{font-size:1rem;font-family:var(--display);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;margin:0}
.ai-context{display:flex;gap:6px;flex-wrap:wrap}
.ai-context .pill{font-size:.66rem}
.ai-burger{display:none;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px;cursor:pointer;line-height:0}
.ai-export{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:7px 12px;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--muted);font-family:var(--body)}
.ai-export:hover{border-color:var(--forest);color:var(--forest-deep)}

/* thread */
.ai-thread{flex:1;overflow-y:auto;padding:26px 18px 10px;scroll-behavior:smooth}
.ai-thread-inner{max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.msg{display:flex;gap:12px;max-width:100%}
.msg .avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;font-weight:800;font-size:.8rem}
.msg.user .avatar{background:var(--ink);color:#fff}
.msg.bot .avatar{background:var(--forest);color:var(--mint)}
.msg .body{min-width:0;flex:1}
.msg .who{font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:4px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}
.msg .content{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 16px;font-size:.94rem;line-height:1.65;overflow-wrap:break-word}
.msg.user .content{background:var(--forest-tint);border-color:var(--mint-soft)}
.msg .content p{margin:0 0 10px}
.msg .content p:last-child{margin:0}
.msg .content ul,.msg .content ol{margin:0 0 10px 20px}
.msg .content li{margin-bottom:4px}
.msg .content code{font-family:var(--mono);font-size:.82em;background:var(--forest-tint);padding:1px 5px;border-radius:5px}
.msg .content a{color:var(--forest-deep);font-weight:600}
.msg .content h1,.msg .content h2,.msg .content h3{font-size:1rem;margin:12px 0 6px}
.msg .sources{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:.78rem;color:var(--muted)}
.msg .sources b{display:block;margin-bottom:4px;font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase}
.msg .sources a{display:block;color:var(--forest-deep);margin-bottom:2px;overflow-wrap:anywhere}
.msg .meta-time{font-size:.66rem;color:var(--muted);margin-top:5px;font-family:var(--mono)}
.typing{display:inline-flex;gap:5px;padding:6px 2px}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--forest);opacity:.4;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
.msg .content.error{border-color:var(--risk);background:var(--risk-soft)}

/* welcome screen */
.ai-welcome{max-width:780px;margin:0 auto;padding:30px 4px;text-align:center}
.ai-welcome h2{font-family:var(--display);font-size:clamp(1.5rem,3vw,2rem);margin-bottom:8px}
.ai-welcome p{color:var(--muted);max-width:520px;margin:0 auto 26px}
.ai-suggest{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;text-align:left}
.ai-suggest button{border:1px solid var(--line);background:var(--card);border-radius:14px;padding:14px;cursor:pointer;font-family:var(--body);transition:border-color var(--t-fast),box-shadow var(--t-fast)}
.ai-suggest button:hover{border-color:var(--forest);box-shadow:var(--shadow-1)}
.ai-suggest .k{display:block;font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--forest);margin-bottom:5px;font-weight:700}
.ai-suggest .q{font-size:.86rem;color:var(--ink);font-weight:600;line-height:1.4}

/* composer */
.ai-composer{padding:12px 18px 16px;background:linear-gradient(to top,var(--paper) 70%,transparent)}
.ai-composer-inner{max-width:780px;margin:0 auto}
.ai-inputrow{display:flex;gap:10px;align-items:flex-end;background:var(--card);border:1.5px solid var(--line-strong);border-radius:18px;padding:10px 10px 10px 16px;box-shadow:var(--shadow-1)}
.ai-inputrow:focus-within{border-color:var(--forest)}
.ai-inputrow textarea{flex:1;border:none;outline:none;resize:none;font-family:var(--body);font-size:.95rem;line-height:1.5;max-height:160px;background:transparent;color:var(--ink)}
.ai-send{width:40px;height:40px;border-radius:12px;border:none;background:var(--forest);color:#fff;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:background var(--t-fast)}
.ai-send:hover{background:var(--forest-deep)}
.ai-send:disabled{background:var(--line-strong);cursor:not-allowed}
.ai-disclaim{text-align:center;font-size:.68rem;color:var(--muted);margin-top:8px}

/* mobile */
.ai-overlay{display:none}
@media (max-width:860px){
  .ai-side{position:fixed;inset:0 auto 0 0;z-index:60;transform:translateX(-100%);transition:transform var(--t-med);width:min(300px,84vw)}
  .ai-side.open{transform:translateX(0)}
  .ai-overlay{display:none;position:fixed;inset:0;background:rgba(10,20,15,.5);z-index:55}
  .ai-overlay.show{display:block}
  .ai-burger{display:grid;place-items:center}
  .ai-context{display:none}
}
</style>
</head>
<body data-page="chat">

<div class="ai-shell">

  <!-- SIDEBAR -->
  <aside class="ai-side" id="aiSide" aria-label="Your conversations">
    <div class="ai-side-head">
      <a href="index.html" class="brand"><svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true" style="width:28px;height:28px"><rect width="32" height="32" rx="9" fill="#0E6E52"/><path d="M8 21V12l4 5 4-7 4 6 4-4v9" stroke="#7BE6A8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="24" cy="10" r="2" fill="#7BE6A8"/></svg>MoneyMentor <span style="color:#7BE6A8">AI</span></a>
    </div>
    <button class="ai-newchat" id="newChatBtn" type="button">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
      New chat
    </button>
    <div class="ai-side-label">Chats</div>
    <div class="ai-chatlist" id="chatList"></div>
    <div class="ai-side-foot">
      <div class="ai-profile-chip">
        <span class="av" data-profile-initial>G</span>
        <span><b data-profile-name>Guest</b><span id="sideProfileMeta">Set up your learning profile</span></span>
      </div>
      <a href="profile.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Edit learning profile</a>
      <a href="index.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 10 9-7 9 7v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Back to MoneyMentor</a>
    </div>
  </aside>
  <div class="ai-overlay" id="aiOverlay"></div>

  <!-- MAIN -->
  <div class="ai-main">
    <div class="ai-topbar">
      <button class="ai-burger" id="aiBurger" type="button" aria-label="Open chat list"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <h1 id="chatTitle">New chat</h1>
      <div class="ai-context" id="contextChips"></div>
      <button class="ai-export" id="exportChatBtn" type="button">Export chat</button>
    </div>

    <div class="ai-thread" id="thread">
      <div class="ai-thread-inner" id="threadInner"></div>
    </div>

    <div class="ai-composer">
      <div class="ai-composer-inner">
        <div class="ai-inputrow">
          <textarea id="composerInput" rows="1" placeholder="Ask about ETFs, SSBs, CPF, scams, or your S$500 plan..." aria-label="Message MoneyMentor AI"></textarea>
          <button class="ai-send" id="sendBtn" type="button" aria-label="Send message"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg></button>
        </div>
        <p class="ai-disclaim">Educational answers grounded in MoneySense, MAS, CPF, and SGX &mdash; not licensed financial advice. Each chat is a separate conversation.</p>
      </div>
    </div>
  </div>
</div>

<script src="assets/app.js" defer></script>
<script defer>
document.addEventListener("DOMContentLoaded", () => {
  "use strict";
  const MM = window.MM || {};
  const CHATS_KEY = "mm_chats_v1";
  const byId = (id) => document.getElementById(id);

  /* ---------- storage ---------- */
  function loadChats() {
    try {
      const c = JSON.parse(localStorage.getItem(CHATS_KEY) || "[]");
      return Array.isArray(c) ? c : [];
    } catch { return []; }
  }
  function saveChats() {
    try { localStorage.setItem(CHATS_KEY, JSON.stringify(chats.slice(0, 50))); } catch {}
  }

  let chats = loadChats();
  let activeId = null;
  let sending = false;

  function makeId() {
    return "chat-" + Date.now() + "-" + Math.random().toString(16).slice(2, 8);
  }
  function activeChat() { return chats.find((c) => c.id === activeId) || null; }

  function newChat(select = true) {
    const chat = { id: makeId(), title: "New chat", createdAt: new Date().toISOString(), messages: [] };
    chats.unshift(chat);
    saveChats();
    if (select) selectChat(chat.id);
    return chat;
  }

  function deleteChat(id) {
    chats = chats.filter((c) => c.id !== id);
    saveChats();
    if (activeId === id) {
      activeId = null;
      if (chats.length) selectChat(chats[0].id);
      else newChat();
    } else renderSidebar();
  }

  function selectChat(id) {
    activeId = id;
    renderSidebar();
    renderThread();
    closeSidebarMobile();
    byId("composerInput").focus();
  }

  /* ---------- sidebar ---------- */
  function renderSidebar() {
    const list = byId("chatList");
    list.innerHTML = "";
    chats.forEach((chat) => {
      const item = document.createElement("div");
      item.className = "ai-chatitem" + (chat.id === activeId ? " active" : "");
      item.setAttribute("role", "button");
      item.tabIndex = 0;
      const t = document.createElement("span");
      t.className = "t";
      t.textContent = chat.title || "New chat";
      const del = document.createElement("button");
      del.className = "del";
      del.type = "button";
      del.setAttribute("aria-label", "Delete chat");
      del.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>';
      del.addEventListener("click", (e) => {
        e.stopPropagation();
        if (window.confirm("Delete this chat? This only removes it from this browser.")) deleteChat(chat.id);
      });
      item.append(t, del);
      item.addEventListener("click", () => selectChat(chat.id));
      item.addEventListener("keydown", (e) => { if (e.key === "Enter") selectChat(chat.id); });
      list.appendChild(item);
    });
  }

  /* ---------- markdown-lite rendering ---------- */
  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function mdToHtml(text) {
    let t = esc(String(text || ""));
    t = t.replace(/`([^`]+)`/g, "<code>$1</code>");
    t = t.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
    t = t.replace(/(^|\s)\*([^*\n]+)\*(?=\s|$|[.,;:!?])/g, "$1<i>$2</i>");
    t = t.replace(/(https?:\/\/[^\s<)\]]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    // lists + headings + paragraphs
    const lines = t.split(/\r?\n/);
    let html = "", inUl = false, inOl = false;
    const closeLists = () => { if (inUl) { html += "</ul>"; inUl = false; } if (inOl) { html += "</ol>"; inOl = false; } };
    lines.forEach((line) => {
      const l = line.trim();
      if (!l) { closeLists(); return; }
      if (/^#{1,3}\s+/.test(l)) { closeLists(); html += "<h3>" + l.replace(/^#{1,3}\s+/, "") + "</h3>"; return; }
      if (/^[-*]\s+/.test(l)) { if (!inUl) { closeLists(); html += "<ul>"; inUl = true; } html += "<li>" + l.replace(/^[-*]\s+/, "") + "</li>"; return; }
      if (/^\d+[.)]\s+/.test(l)) { if (!inOl) { closeLists(); html += "<ol>"; inOl = true; } html += "<li>" + l.replace(/^\d+[.)]\s+/, "") + "</li>"; return; }
      closeLists();
      html += "<p>" + l + "</p>";
    });
    closeLists();
    return html;
  }
  function extractSources(text) {
    const urls = [...new Set(String(text || "").match(/https?:\/\/[^\s<)\]"']+/g) || [])];
    return urls.filter((u) => /mas\.gov\.sg|moneysense\.gov\.sg|cpf\.gov\.sg|sgx\.com|reuters\.com|channelnewsasia\.com|businesstimes\.com/i.test(u));
  }

  /* ---------- thread rendering ---------- */
  const SUGGESTIONS = [
    { k: "First step", q: "I'm new to investing in Singapore. Based on my profile, what should I do first?" },
    { k: "S$500 plan", q: "I have S$500. Give me a ranked beginner shortlist with reasons, risks, and platform routes." },
    { k: "Explain a term", q: "Explain what an ETF is in simple language, with a Singapore example." },
    { k: "Scam check", q: "A Telegram group promises 20% monthly returns with no risk. What are the red flags, and how do I verify a firm?" },
    { k: "SSB vs T-bill", q: "Compare Singapore Savings Bonds and T-bills for a beginner: minimums, lock-in, and which fits a 6-month horizon." },
    { k: "Review my practice", q: "Review my MoneyMentor Market Run result and tell me what I should learn from it." }
  ];

  function renderWelcome(container) {
    const w = document.createElement("div");
    w.className = "ai-welcome";
    const profile = MM.getProfile ? MM.getProfile() : {};
    const name = profile.nickname && profile.nickname !== "Guest" ? ", " + profile.nickname : "";
    w.innerHTML = `
      <h2>How can I help${esc(name)}?</h2>
      <p>I answer using your saved learning profile and trusted Singapore sources (MoneySense, MAS, CPF, SGX). Every answer explains the risk, not just the upside.</p>
      <div class="ai-suggest"></div>`;
    const grid = w.querySelector(".ai-suggest");
    SUGGESTIONS.forEach((s) => {
      const b = document.createElement("button");
      b.type = "button";
      b.innerHTML = `<span class="k">${s.k}</span><span class="q">${esc(s.q)}</span>`;
      b.addEventListener("click", () => sendMessage(s.q));
      grid.appendChild(b);
    });
    container.appendChild(w);
  }

  function appendMessage(container, message) {
    const el = document.createElement("div");
    el.className = "msg " + (message.role === "user" ? "user" : "bot");
    const avatar = message.role === "user"
      ? `<span class="avatar">${esc((MM.getProfile ? (MM.getProfile().nickname || "G") : "G").slice(0, 1).toUpperCase())}</span>`
      : '<span class="avatar">AI</span>';
    const sources = message.role === "bot" ? extractSources(message.content) : [];
    el.innerHTML = `
      ${avatar}
      <div class="body">
        <div class="who">${message.role === "user" ? "You" : "MoneyMentor AI"}</div>
        <div class="content ${message.error ? "error" : ""}">${mdToHtml(message.content)}</div>
        ${sources.length ? `<div class="sources"><b>Sources referenced</b>${sources.map((u) => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`).join("")}</div>` : ""}
        ${message.ts ? `<div class="meta-time">${new Date(message.ts).toLocaleString("en-SG")}</div>` : ""}
      </div>`;
    container.appendChild(el);
  }

  function renderThread() {
    const inner = byId("threadInner");
    inner.innerHTML = "";
    const chat = activeChat();
    byId("chatTitle").textContent = chat && chat.title ? chat.title : "New chat";
    renderContextChips();
    if (!chat || !chat.messages.length) {
      renderWelcome(inner);
      return;
    }
    chat.messages.forEach((m) => appendMessage(inner, m));
    scrollToBottom();
  }

  function renderContextChips() {
    const box = byId("contextChips");
    const profile = MM.getProfile ? MM.getProfile() : null;
    if (!profile) { box.innerHTML = ""; return; }
    box.innerHTML = ["Risk: " + profile.riskComfort, "Horizon: " + profile.timeHorizon, "Budget: " + profile.budget]
      .map((c) => `<span class="pill">${esc(c)}</span>`).join("");
    const meta = byId("sideProfileMeta");
    if (meta) meta.textContent = `${profile.riskComfort} risk · ${profile.timeHorizon}`;
  }

  function scrollToBottom() {
    const thread = byId("thread");
    thread.scrollTop = thread.scrollHeight;
  }

  /* ---------- sending ---------- */
  function typingBubble() {
    const el = document.createElement("div");
    el.className = "msg bot";
    el.id = "typingMsg";
    el.innerHTML = '<span class="avatar">AI</span><div class="body"><div class="who">MoneyMentor AI</div><div class="content"><span class="typing"><span></span><span></span><span></span></span></div></div>';
    return el;
  }

  async function sendMessage(text) {
    const message = String(text || "").trim();
    if (!message || sending) return;
    let chat = activeChat();
    if (!chat) chat = newChat(false), activeId = chat.id;

    // first message becomes the title
    if (!chat.messages.length) {
      chat.title = message.length > 42 ? message.slice(0, 42) + "…" : message;
    }
    chat.messages.push({ role: "user", content: message, ts: Date.now() });
    saveChats();
    renderSidebar();
    renderThread();

    const input = byId("composerInput");
    input.value = "";
    autoGrow(input);
    sending = true;
    byId("sendBtn").disabled = true;
    const inner = byId("threadInner");
    inner.appendChild(typingBubble());
    scrollToBottom();

    let reply = "", isError = false;
    try {
      const metadata = MM.getChatMetadata ? MM.getChatMetadata() : {};
      metadata.chatId = chat.id;
      metadata.chatTitle = chat.title;
      const res = await fetch(MM.CHAT_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "sendMessage",
          sessionId: chat.id, // each chat = its own conversation memory in n8n
          chatInput: message,
          metadata
        })
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json().catch(() => null);
      reply = (data && (data.output || data.text || data.answer || data.message)) || "";
      if (!reply && data) reply = typeof data === "string" ? data : JSON.stringify(data);
      if (!reply) throw new Error("Empty response");
    } catch (err) {
      isError = true;
      reply = "I could not reach the MoneyMentor AI service just now. Check your connection (the n8n workflow must be active), then try again. Your message is saved in this chat, so nothing is lost.";
    }

    document.getElementById("typingMsg")?.remove();
    chat.messages.push({ role: "bot", content: reply, ts: Date.now(), error: isError });
    saveChats();
    renderThread();
    sending = false;
    byId("sendBtn").disabled = false;
    input.focus();
  }

  /* ---------- export (testing evidence) ---------- */
  function exportChat() {
    const chat = activeChat();
    if (!chat || !chat.messages.length) return;
    const lines = [
      "MoneyMentor AI chat export",
      "Chat: " + chat.title,
      "Chat ID (n8n session): " + chat.id,
      "Exported: " + new Date().toLocaleString("en-SG"),
      ""
    ];
    chat.messages.forEach((m) => {
      lines.push("[" + new Date(m.ts).toLocaleString("en-SG") + "] " + (m.role === "user" ? "USER" : "MONEYMENTOR AI"));
      lines.push(m.content, "");
    });
    const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "moneymentor-chat-evidence.txt";
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 250);
  }

  /* ---------- composer ---------- */
  function autoGrow(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }
  const input = byId("composerInput");
  input.addEventListener("input", () => autoGrow(input));
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input.value);
    }
  });
  byId("sendBtn").addEventListener("click", () => sendMessage(input.value));
  byId("newChatBtn").addEventListener("click", () => newChat());
  byId("exportChatBtn").addEventListener("click", exportChat);

  /* ---------- mobile sidebar ---------- */
  const side = byId("aiSide"), overlay = byId("aiOverlay");
  function closeSidebarMobile() { side.classList.remove("open"); overlay.classList.remove("show"); }
  byId("aiBurger").addEventListener("click", () => { side.classList.add("open"); overlay.classList.add("show"); });
  overlay.addEventListener("click", closeSidebarMobile);

  /* ---------- boot ---------- */
  const params = new URLSearchParams(location.search);
  const incoming = params.get("q") || localStorage.getItem("mm_pending_question") || "";
  localStorage.removeItem("mm_pending_question");
  if (params.get("q")) history.replaceState(null, "", "chat.html");

  if (incoming) {
    newChat();          // question always starts a fresh chat
    sendMessage(incoming);
  } else if (chats.length) {
    selectChat(chats[0].id);
  } else {
    newChat();
  }
});
</script>
</body>
</html>
